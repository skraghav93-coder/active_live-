<!DOCTYPE html>
<html>
<head>
  <title>Live Status Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
<div id="map" style="height: 100vh;"></div>

<script>
const map = L.map('map').setView([28.6, 77.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.layerGroup().addTo(map);

function loadData() {
  fetch("https://script.google.com/macros/s/AKfycbzzZVpEuzA4LbX1DPf6dnQ5wbG3VMBIeCl5mT6CT7C4P8tTgDE5RGtPYi5qcFUWdSb3kA/exec")
    .then(res => res.json())
    .then(data => {
      
      markersLayer.clearLayers();

      data.forEach(point => {
        let color = point.status === "Pending" ? "red" : "green";

        let marker = L.circleMarker([point.lat, point.lng], {
          radius: 8,
          color: color,
          fillOpacity: 0.8
        });

        marker.bindPopup(point.status);
        markersLayer.addLayer(marker);
      });
    });
}

// refresh every 5 seconds
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
