<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; }

    .controls {
      padding: 10px;
      background: #f5f5f5;
    }

    select {
      padding: 6px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div class="controls">
  <b>Select Status:</b>

  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower Reached</option>
    <option value="Enrollment">Enrollment Start</option>
  </select>

  <select id="secondary"></select>
</div>

<div id="map"></div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbwzRtXBgSV6eTPQsSM8la6ouGcq9EoTjsvTLmpDsA2dxpqvJXgkCcfKYOBQERjgK_I5xQ/exec";

const map = L.map('map').setView([25.3176, 82.9739], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.layerGroup().addTo(map);

// Dropdown logic
function handlePrimaryChange() {
  const primary = document.getElementById("primary").value;
  const secondary = document.getElementById("secondary");

  secondary.innerHTML = "";

  if (primary === "Manpower") {
    ["Bio_M", "CSO_M", "Frisking_M"].forEach(opt => {
      let o = document.createElement("option");
      o.value = opt;
      o.text = opt;
      secondary.appendChild(o);
    });
  } else {
    let o = document.createElement("option");
    o.value = "Bio_EN";
    o.text = "Bio_EN";
    secondary.appendChild(o);
  }

  loadData();
}

document.getElementById("secondary").onchange = loadData;

// 🎯 STATUS LOGIC
function getIcon(point, sheetName) {

  let isGreen = false;

  if (sheetName === "Bio_EN") {
    isGreen = point.status === "Started";
  } else {
    isGreen = point.status === "Complete";
  }

  return L.divIcon({
    html: `
      <div style="text-align:center;">
        <div style="
          background:white;
          padding:2px 6px;
          border-radius:4px;
          font-size:12px;
          font-weight:bold;
          box-shadow:0 0 3px rgba(0,0,0,0.3);
        ">
          ${point.center_code}
        </div>
        <img src="${
          isGreen
            ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
            : "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png"
        }" style="width:30px;">
      </div>
    `,
    iconAnchor: [20, 50]
  });
}

// ✅ JSONP Loader (fixes CORS)
function loadData() {

  const sheet = document.getElementById("secondary").value;

  // remove old script
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";

  script.src = API_BASE + "?sheet=" + sheet + "&callback=handleData";

  document.body.appendChild(script);
}

// ✅ Data handler
function handleData(data) {

  markersLayer.clearLayers();

  data.forEach(point => {

    let icon = getIcon(point, document.getElementById("secondary").value);

    let marker = L.marker(
      [parseFloat(point.lat), parseFloat(point.lng)],
      { icon: icon }
    );

    markersLayer.addLayer(marker);
  });
}

// Init
handlePrimaryChange();

// Auto refresh
setInterval(loadData, 5000);

</script>

</body>
</html>
