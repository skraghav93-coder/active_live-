<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #eceff1;
      --card: #ffffff;
      --text: #000;
      --header: #263238;
    }

    body.dark {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
      --header: #000;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: var(--bg);
      color: var(--text);
    }

    #dashboard {
      padding: 15px;
      background: var(--header);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .controls {
      padding: 10px;
      background: var(--card);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      min-width: 140px;
      font-weight: 500;
    }

    #container {
      display: flex;
      height: calc(100vh - 110px);
    }

    #leftPanel {
      width: 350px;
      background: var(--card);
      overflow-y: auto;
      border-right: 1px solid #ccc;
    }

    #map { flex-grow: 1; }

    .cityCard {
      display: flex;
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .cityCard:hover { background: rgba(33,150,243,0.2); }

    .col { width: 25%; text-align: center; }
    .col-name { width: 40%; text-align: left; font-weight: bold; }
  </style>
</head>

<body>

<div id="dashboard">
  <div>📊 Live Dashboard</div>
  <div>
    <span id="count1"></span>
    <span id="count2" style="margin-left:20px;"></span>
    <button onclick="toggleTheme()">🌙 Toggle</button>
  </div>
</div>

<div class="controls">
  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower</option>
    <option value="Enrollment">Enrollment</option>
  </select>

  <select id="secondary"></select>

  <select id="cityFilter" onchange="applyCityFilter()">
    <option value="All">All Cities</option>
  </select>

  <select id="sortBy" onchange="applyCityFilter()">
    <option value="name">🔤 Name</option>
    <option value="percent">📊 Completion %</option>
    <option value="total">📦 Total Centers</option>
  </select>
</div>

<div id="container">
  <div id="leftPanel">
    <div id="cityStats"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const API_BASE = "YOUR_API_URL_HERE";

const map = L.map('map').setView([25.3, 82.9], 7);

// 🌞 Light map
let lightLayer = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

// 🌙 Dark map
let darkLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
);

lightLayer.addTo(map);

let markersLayer = L.layerGroup().addTo(map);
let fullData = [];

// 🌙 Toggle theme + map
function toggleTheme() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    map.removeLayer(lightLayer);
    map.addLayer(darkLayer);
  } else {
    map.removeLayer(darkLayer);
    map.addLayer(lightLayer);
  }
}

// Dropdown logic
function handlePrimaryChange() {
  const secondary = document.getElementById("secondary");
  secondary.innerHTML = "";

  const opts = (primary.value === "Manpower")
    ? ["Bio_M","CSO_M","Frisking_M"]
    : ["Bio_EN"];

  opts.forEach(o => {
    let opt = document.createElement("option");
    opt.value = opt.text = o;
    secondary.appendChild(opt);
  });

  loadData();
}

secondary.onchange = loadData;

// Marker icon
function getIcon(isGreen) {
  return L.icon({
    iconUrl: isGreen
      ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
      : "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png",
    iconSize: [30,30],
    iconAnchor: [15,30]
  });
}

// Load API
function loadData() {
  const sheet = secondary.value;

  const old = document.getElementById("jsonp");
  if (old) old.remove();

  const s = document.createElement("script");
  s.id = "jsonp";
  s.src = `${API_BASE}?sheet=${sheet}&callback=handleData`;

  document.body.appendChild(s);
}

// Handle data
function handleData(data) {
  fullData = data;
  populateCityFilter(data);
  applyCityFilter();
}

// City filter dropdown
function populateCityFilter(data) {
  const select = document.getElementById("cityFilter");
  let cities = new Set();

  data.forEach(p => {
    for (let k in p) {
      if (k.toLowerCase().includes("city")) {
        cities.add(p[k]);
      }
    }
  });

  select.innerHTML = '<option value="All">All Cities</option>';

  [...cities].sort().forEach(c => {
    let opt = document.createElement("option");
    opt.value = opt.text = c;
    select.appendChild(opt);
  });
}

// Apply filter
function applyCityFilter() {
  const selectedCity = cityFilter.value;

  let filtered = (selectedCity === "All")
    ? fullData
    : fullData.filter(p => {
        for (let k in p) {
          if (k.toLowerCase().includes("city")) {
            return p[k] === selectedCity;
          }
        }
      });

  renderAll(filtered);
}

// Render all
function renderAll(data) {

  markersLayer.clearLayers();

  let stats = { pending:0, complete:0, started:0 };
  let cityMap = {};
  const sheet = secondary.value;

  data.forEach(p => {

    let city="Unknown", status="", lat, lng, code;

    for (let k in p) {
      let key = k.toLowerCase();
      if (key.includes("city")) city = p[k];
      if (key.includes("status")) status = String(p[k]).toLowerCase();
      if (key.includes("lat")) lat = parseFloat(p[k]);
      if (key.includes("lng")) lng = parseFloat(p[k]);
      if (key.includes("center")) code = p[k];
    }

    if (!cityMap[city]) cityMap[city] = { total:0, complete:0, coords:[] };

    cityMap[city].total++;

    let isGreen = false;

    if (sheet === "Bio_EN") {
      isGreen = (status === "started");
      isGreen ? stats.started++ : stats.pending++;
    } else {
      isGreen = (status === "completed" || status === "partial");
      isGreen ? stats.complete++ : stats.pending++;
    }

    if (isGreen) cityMap[city].complete++;

    if (!isNaN(lat) && !isNaN(lng)) {
      let m = L.marker([lat,lng], { icon: getIcon(isGreen) });
      m.bindTooltip(`${code} (${city})`);
      markersLayer.addLayer(m);
      cityMap[city].coords.push([lat,lng]);
    }
  });

  renderCityStats(cityMap);
  updateDashboard(sheet, stats);
}

// Sorting + render
function renderCityStats(cityMap) {

  const div = document.getElementById("cityStats");
  div.innerHTML = "";

  const sortBy = document.getElementById("sortBy").value;
  let cities = Object.keys(cityMap);

  cities.sort((a,b)=>{
    const da = cityMap[a];
    const db = cityMap[b];

    const pa = da.total ? da.complete/da.total : 0;
    const pb = db.total ? db.complete/db.total : 0;

    if (sortBy === "percent") return pb - pa;
    if (sortBy === "total") return db.total - da.total;

    return a.localeCompare(b);
  });

  cities.forEach(city => {

    const d = cityMap[city];
    const percent = d.total ? Math.round((d.complete/d.total)*100) : 0;

    let card = document.createElement("div");
    card.className = "cityCard";

    card.onclick = () => {
      if (d.coords.length > 0)
        map.fitBounds(L.latLngBounds(d.coords), {padding:[50,50]});
    };

    card.innerHTML = `
      <div class="col-name">${city}</div>
      <div class="col">${d.total}</div>
      <div class="col">${d.complete}</div>
      <div class="col">${percent}%</div>
    `;

    div.appendChild(card);
  });
}

// Dashboard
function updateDashboard(sheet, stats) {
  if (sheet === "Bio_EN") {
    count1.innerHTML = `Started: ${stats.started}`;
    count2.innerHTML = `Pending: ${stats.pending}`;
  } else {
    count1.innerHTML = `Completed: ${stats.complete}`;
    count2.innerHTML = `Pending: ${stats.pending}`;
  }
}

// Init
handlePrimaryChange();
setInterval(loadData, 10000);

</script>

</body>
</html>
