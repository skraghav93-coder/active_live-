<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; }

    .controls {
      padding: 10px;
      background: #f5f5f5;
    }

    select {
      padding: 6px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div class="controls">
  <b>Select Status:</b>

  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower Reached</option>
    <option value="Enrollment">Enrollment Start</option>
  </select>

  <select id="secondary"></select>
</div>

<div id="map"></div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbwzRtXBgSV6eTPQsSM8la6ouGcq9EoTjsvTLmpDsA2dxpqvJXgkCcfKYOBQERjgK_I5xQ/exec";

const map = L.map('map').setView([28.6, 77.2], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.layerGroup().addTo(map);

// Dropdown logic
function handlePrimaryChange() {
  const primary = document.getElementById("primary").value;
  const secondary = document.getElementById("secondary");

  secondary.innerHTML = "";

  if (primary === "Manpower") {
    ["Bio_M", "CSO_M", "Frisking_M"].forEach(opt => {
      let o = document.createElement("option");
      o.value = opt;
      o.text = opt;
      secondary.appendChild(o);
    });
  } else {
    let o = document.createElement("option");
    o.value = "Bio_EN";
    o.text = "Bio_EN";
    secondary.appendChild(o);
  }

  loadData();
}

document.getElementById("secondary").onchange = loadData;

// 🎯 STATUS → COLOR LOGIC
function getIcon(point, sheetName) {

  let isGreen = false;

  if (sheetName === "Bio_EN") {
    // Enrollment logic
    isGreen = point.status === "Started";
  } else {
    // Manpower logic
    isGreen = point.status === "Completed";
  }

  return L.divIcon({
    className: "custom-marker",
    html: `
      <div style="text-align:center;">
        <div style="
          background:white;
          padding:2px 6px;
          border-radius:4px;
          font-size:12px;
          font-weight:bold;
          box-shadow:0 0 3px rgba(0,0,0,0.3);
        ">
          ${point.center_code}
        </div>
        <img src="${
          isGreen
            ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
            : "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png"
        }" style="width:30px;">
      </div>
    `,
    iconAnchor: [20, 50]
  });
}

// Load data
function loadData() {

  const sheet = document.getElementById("secondary").value;

  fetch(API_BASE + "?sheet=" + sheet)
    .then(res => res.json())
    .then(data => {

      markersLayer.clearLayers();

      data.forEach(point => {

        let icon = getIcon(point, sheet);

        let marker = L.marker([point.lat, point.lng], { icon: icon });

        marker.bindPopup(`
          <b>Center:</b> ${point.center_code}<br>
          <b>Status:</b> ${point.status}
        `);

        markersLayer.addLayer(marker);
      });

    });
}

// Initial load
handlePrimaryChange();

// Auto refresh
setInterval(loadData, 5000);

</script>

</body>
</html>
