<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #eceff1; }

    #dashboard {
      padding: 15px 20px;
      background: #263238;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .stats-group { display: flex; gap: 20px; }
    .stat-box { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }

    .controls { padding: 15px; background: #fff; border-bottom: 1px solid #ccc; display: flex; align-items: center; gap: 10px; }

    #container { display: flex; height: calc(100vh - 120px); }

    #leftPanel {
      width: 360px;
      background: #fdfdfd;
      overflow-y: auto;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    .panel-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; margin: 0; font-size: 1.2rem; }

    /* Column Layout matches: City | Total | Done | % */
    .city-list-header {
      display: flex;
      background: #f1f1f1;
      padding: 10px 15px;
      font-size: 11px;
      font-weight: bold;
      color: #555;
      text-transform: uppercase;
      border-bottom: 2px solid #ddd;
    }

    .cityCard {
      display: flex;
      padding: 12px 15px;
      background: white;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
      align-items: center;
    }
    
    .cityCard:hover { background: #e3f2fd; }

    .col-name { width: 40%; font-weight: bold; color: #1976d2; }
    .col-total { width: 20%; text-align: center; color: #333; }
    .col-done { width: 20%; text-align: center; font-weight: bold; color: #2e7d32; }
    .col-perc { width: 20%; text-align: right; font-weight: bold; color: #333; }

    #map { flex-grow: 1; height: 100%; }
    select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; outline: none; }
  </style>
</head>

<body>

<div id="dashboard">
  <div style="font-weight: bold; font-size: 1.2rem;">UPPRPB Home guard 25-27 Apr</div>
  <div class="stats-group">
    <div id="count1" class="stat-box">--</div>
    <div id="count2" class="stat-box">--</div>
  </div>
</div>

<div class="controls">
  <b>Filter:</b>
  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower Reached</option>
    <option value="Enrollment">Enrollment Start</option>
  </select>
  <select id="secondary"></select>
  <span id="loader" style="font-size: 12px; color: #1976d2; display:none;">🔄 Refreshing...</span>
</div>

<div id="container">
  <div id="leftPanel">
    <h3 class="panel-header">City Dashboard</h3>
    <div class="city-list-header">
      <div class="col-name">City Name</div>
      <div class="col-total">Total</div>
      <div class="col-done">Done</div>
      <div class="col-perc">%</div>
    </div>
    <div id="cityStats" style="overflow-y: auto; flex-grow: 1;"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbwzRtXBgSV6eTPQsSM8la6ouGcq9EoTjsvTLmpDsA2dxpqvJXgkCcfKYOBQERjgK_I5xQ/exec";

const map = L.map('map').setView([25.3176, 82.9739], 7);
L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let markersLayer = L.layerGroup().addTo(map);

function handlePrimaryChange() {
  const primary = document.getElementById("primary").value;
  const secondary = document.getElementById("secondary");
  secondary.innerHTML = "";
  const options = (primary === "Manpower") ? ["Bio_M", "CSO_M", "Frisking_M"] : ["Bio_EN"];
  options.forEach(opt => {
    let o = document.createElement("option");
    o.value = o.text = opt;
    secondary.appendChild(o);
  });
  loadData();
}

document.getElementById("secondary").onchange = loadData;

function getIcon(isGreen) {
  const color = isGreen ? 'green' : 'red';
  return new L.Icon({
    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
  });
}

function loadData() {
  document.getElementById("loader").style.display = "inline";
  const sheet = document.getElementById("secondary").value;
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();
  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = `${API_BASE}?sheet=${sheet}&callback=handleData`;
  document.body.appendChild(script);
}

function handleData(data) {
  document.getElementById("loader").style.display = "none";
  markersLayer.clearLayers();

  let stats = { pending: 0, complete: 0, started: 0 };
  const sheet = document.getElementById("secondary").value;
  let cityMap = {};

  data.forEach(point => {
    // 🔹 DYNAMIC HEADER MATCHING
    let rawCity = "Unknown";
    let rawStatus = "";
    let rawLat, rawLng, rawCode;

    for (let key in point) {
      const k = key.trim().toLowerCase();
      if (k === "city") rawCity = point[key];
      if (k === "status") rawStatus = String(point[key]);
      if (k === "lat" || k === "latitude") rawLat = point[key];
      if (k === "lng" || k === "longitude") rawLng = point[key];
      if (k === "center_code") rawCode = point[key];
    }

    const city = String(rawCity).trim();
    const status = rawStatus.trim().toLowerCase();
    const lat = parseFloat(rawLat);
    const lng = parseFloat(rawLng);

    if (!cityMap[city]) {
      cityMap[city] = { total: 0, complete: 0, coords: [] };
    }
    
    cityMap[city].total++;
    if (!isNaN(lat) && !isNaN(lng)) cityMap[city].coords.push([lat, lng]);

    let isSuccess = false;
    if (sheet === "Bio_EN") {
      isSuccess = (status === "started");
      isSuccess ? stats.started++ : stats.pending++;
    } else {
      isSuccess = (status === "completed" || status === "partial");
      isSuccess ? stats.complete++ : stats.pending++;
    }

    if (isSuccess) cityMap[city].complete++;

    if (!isNaN(lat) && !isNaN(lng)) {
      let marker = L.marker([lat, lng], { icon: getIcon(isSuccess) });
      marker.bindTooltip(`<b>${rawCode || "N/A"}</b><br>${city}`);
      markersLayer.addLayer(marker);
    }
  });

  renderCityStats(cityMap);
  updateDashboard(sheet, stats);
}

function updateDashboard(sheet, stats) {
  if (sheet === "Bio_EN") {
    document.getElementById("count1").innerHTML = `▶ Started: <b>${stats.started}</b>`;
    document.getElementById("count2").innerHTML = `🔴 Pending: <b>${stats.pending}</b>`;
  } else {
    document.getElementById("count1").innerHTML = `✅ Completed: <b>${stats.complete}</b>`;
    document.getElementById("count2").innerHTML = `🔴 Pending: <b>${stats.pending}</b>`;
  }
}

function renderCityStats(cityMap) {
  const div = document.getElementById("cityStats");
  div.innerHTML = "";

  Object.keys(cityMap).sort().forEach(city => {
    const d = cityMap[city];
    const percent = d.total > 0 ? Math.round((d.complete / d.total) * 100) : 0;
    
    const card = document.createElement("div");
    card.className = "cityCard";
    card.onclick = () => {
        if(d.coords.length > 0) map.fitBounds(L.latLngBounds(d.coords), { padding: [50, 50], maxZoom: 12 });
    };

    card.innerHTML = `
      <div class="col-name">${city}</div>
      <div class="col-total">${d.total}</div>
      <div class="col-done">${d.complete}</div>
      <div class="col-perc">${percent}%</div>
    `;
    div.appendChild(card);
  });
}

// Initial Run
handlePrimaryChange();
setInterval(loadData, 10000); // Refreshes every 10 seconds

</script>
</body>
</html>
