<!DOCTYPE html>
<html>
<head>
  <title>Live Status Map</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .legend {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.2);
      font-family: Arial;
      font-size: 14px;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="legend">
  <b>Status</b><br>
  🔴 Pending<br>
  🟢 Started
</div>

<script>
const map = L.map('map').setView([28.6, 77.2], 10);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// Layer for markers
let markersLayer = L.layerGroup().addTo(map);

// 🔴 Red pin (Google style)
const redIcon = new L.Icon({
  iconUrl: 'https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png',
  iconSize: [40, 40],
  iconAnchor: [20, 40],
  popupAnchor: [0, -40]
});

// 🟢 Green pin
const greenIcon = new L.Icon({
  iconUrl: 'https://maps.google.com/mapfiles/ms/icons/green-dot.png',
  iconSize: [32, 32],
  iconAnchor: [16, 32],
  popupAnchor: [0, -32]
});

// Load data from API
function loadData() {
  fetch("https://script.google.com/macros/s/AKfycbzzZVpEuzA4LbX1DPf6dnQ5wbG3VMBIeCl5mT6CT7C4P8tTgDE5RGtPYi5qcFUWdSb3kA/exec")
    .then(res => res.json())
    .then(data => {

      markersLayer.clearLayers();

      data.forEach(point => {

        let icon = point.status === "Pending" ? redIcon : greenIcon;

        let marker = L.marker([point.lat, point.lng], { icon: icon });

        marker.bindPopup(`
          <b>Status:</b> ${point.status}<br>
          <b>Lat:</b> ${point.lat}<br>
          <b>Lng:</b> ${point.lng}
        `);

        markersLayer.addLayer(marker);
      });

    })
    .catch(err => console.log("Error loading data:", err));
}

// Auto refresh every 5 seconds
setInterval(loadData, 5000);
loadData();

</script>

</body>
</html>
