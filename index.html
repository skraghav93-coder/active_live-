<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }

    #dashboard {
      padding: 10px;
      background: #ffffff;
      display: flex;
      gap: 20px;
      border-bottom: 1px solid #ddd;
    }

    .controls {
      padding: 10px;
      background: #f5f5f5;
    }

    #container {
      display: flex;
      height: 85vh;
    }

    #leftPanel {
      width: 30%;
      background: #f8f8f8;
      overflow-y: auto;
      padding: 10px;
      border-right: 1px solid #ccc;
    }

    #map {
      width: 70%;
      height: 100%;
    }

    .cityCard {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    select {
      padding: 6px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div id="dashboard">
  <div id="count1">--</div>
  <div id="count2">--</div>
</div>

<div class="controls">
  <b>Select Status:</b>

  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower Reached</option>
    <option value="Enrollment">Enrollment Start</option>
  </select>

  <select id="secondary"></select>
</div>

<!-- ✅ NEW SPLIT -->
<div id="container">
  <div id="leftPanel">
    <h3>City Dashboard</h3>
    <div id="cityStats"></div>
  </div>

  <div id="map"></div>
</div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbwzRtXBgSV6eTPQsSM8la6ouGcq9EoTjsvTLmpDsA2dxpqvJXgkCcfKYOBQERjgK_I5xQ/exec";

const map = L.map('map').setView([25.3176, 82.9739], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.layerGroup().addTo(map);

// Dropdown
function handlePrimaryChange() {
  const primary = document.getElementById("primary").value;
  const secondary = document.getElementById("secondary");

  secondary.innerHTML = "";

  if (primary === "Manpower") {
    ["Bio_M", "CSO_M", "Frisking_M"].forEach(opt => {
      let o = document.createElement("option");
      o.value = opt;
      o.text = opt;
      secondary.appendChild(o);
    });
  } else {
    let o = document.createElement("option");
    o.value = "Bio_EN";
    o.text = "Bio_EN";
    secondary.appendChild(o);
  }

  loadData();
}

document.getElementById("secondary").onchange = loadData;

// Icon logic
function getIcon(point, sheetName) {

  const status = String(point.status).trim().toLowerCase();
  let isGreen = false;

  if (sheetName === "Bio_EN") {
    isGreen = status === "started";
  } else {
    isGreen = (status === "completed" || status === "partial");
  }

  return L.icon({
    iconUrl: isGreen
      ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
      : "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png",
    iconSize: [30, 30],
    iconAnchor: [15, 30]
  });
}

// JSONP loader
function loadData() {

  const sheet = document.getElementById("secondary").value;

  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  const script = document.createElement("script");
  script.id = "jsonpScript";

  script.src = API_BASE + "?sheet=" + sheet + "&callback=handleData";

  document.body.appendChild(script);
}

// MAIN
function handleData(data) {

  markersLayer.clearLayers();

  let pending = 0;
  let complete = 0;
  let started = 0;

  const sheet = document.getElementById("secondary").value;

  let cityMap = {}; // ✅ NEW

  data.forEach(point => {

    const status = String(point.status).trim().toLowerCase();
    const city = point.city || "Unknown";

    // 🔹 CITY LOGIC
    if (!cityMap[city]) {
      cityMap[city] = { total: 0, complete: 0, pending: 0 };
    }

    cityMap[city].total++;

    if (sheet === "Bio_EN") {
      if (status === "started") {
        started++;
        cityMap[city].complete++;
      } else {
        pending++;
        cityMap[city].pending++;
      }
    } else {
      if (status === "completed" || status === "partial") {
        complete++;
        cityMap[city].complete++;
      } else {
        pending++;
        cityMap[city].pending++;
      }
    }

    // 🔹 MAP
    let marker = L.marker(
      [parseFloat(point.lat), parseFloat(point.lng)],
      { icon: getIcon(point, sheet) }
    );

    marker.bindTooltip(`${point.center_code} (${city})`);

    markersLayer.addLayer(marker);
  });

  renderCityStats(cityMap); // ✅ NEW

  // Dashboard
  if (sheet === "Bio_EN") {
    document.getElementById("count1").innerHTML =
      "▶ Started: <b>" + started + "</b>";

    document.getElementById("count2").innerHTML =
      "🔴 Pending: <b>" + pending + "</b>";
  } else {
    document.getElementById("count1").innerHTML =
      "✅ Completed: <b>" + complete + "</b>";

    document.getElementById("count2").innerHTML =
      "🔴 Pending: <b>" + pending + "</b>";
  }
}

// ✅ CITY PANEL RENDER
function renderCityStats(cityMap) {

  const div = document.getElementById("cityStats");
  div.innerHTML = "";

  Object.keys(cityMap).forEach(city => {

    const d = cityMap[city];
    const percent = ((d.complete / d.total) * 100).toFixed(1);

    div.innerHTML += `
      <div class="cityCard">
        <b>${city}</b><br>
        Total: ${d.total}<br>
        Completed: ${d.complete}<br>
        Pending: ${d.pending}<br>
        <b>Completion: ${percent}%</b>
      </div>
    `;
  });
}

// Init
handlePrimaryChange();

// Auto refresh
setInterval(loadData, 5000);

</script>

</body>
</html>
