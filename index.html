<!DOCTYPE html>
<html>
<head>
  <title>Live Service Map Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: 'Segoe UI', Arial; background: #eceff1; }

    #dashboard {
      padding: 15px;
      background: #263238;
      color: white;
      display: flex;
      justify-content: space-between;
    }

    .controls {
      padding: 10px;
      background: white;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #container { display: flex; height: calc(100vh - 110px); }

    #leftPanel {
      width: 350px;
      background: #fff;
      overflow-y: auto;
      border-right: 1px solid #ccc;
    }

    #map { flex-grow: 1; }

    .cityCard {
      display: flex;
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .cityCard:hover { background: #e3f2fd; }

    .col { width: 25%; text-align: center; }
    .col-name { width: 40%; text-align: left; font-weight: bold; color: #1976d2; }

    select { padding: 6px; }
  </style>
</head>

<body>

<div id="dashboard">
  <div>Live Dashboard</div>
  <div>
    <span id="count1"></span>
    <span id="count2" style="margin-left:20px;"></span>
  </div>
</div>

<div class="controls">
  <select id="primary" onchange="handlePrimaryChange()">
    <option value="Manpower">Manpower</option>
    <option value="Enrollment">Enrollment</option>
  </select>

  <select id="secondary"></select>

  <!-- 🆕 CITY FILTER -->
  <select id="cityFilter" onchange="applyCityFilter()">
    <option value="All">All Cities</option>
  </select>
</div>

<div id="container">
  <div id="leftPanel">
    <div id="cityStats"></div>
  </div>
  <div id="map"></div>
</div>

<script>
const API_BASE = "https://script.google.com/macros/s/AKfycbwzRtXBgSV6eTPQsSM8la6ouGcq9EoTjsvTLmpDsA2dxpqvJXgkCcfKYOBQERjgK_I5xQ/exec";

const map = L.map('map').setView([25.3, 82.9], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markersLayer = L.layerGroup().addTo(map);
let fullData = []; // store original data

function handlePrimaryChange() {
  const secondary = document.getElementById("secondary");
  secondary.innerHTML = "";

  const opts = (primary.value === "Manpower")
    ? ["Bio_M","CSO_M","Frisking_M"]
    : ["Bio_EN"];

  opts.forEach(o => {
    let opt = document.createElement("option");
    opt.value = opt.text = o;
    secondary.appendChild(opt);
  });

  loadData();
}

secondary.onchange = loadData;

function getIcon(isGreen) {
  return L.icon({
    iconUrl: isGreen
      ? "https://maps.google.com/mapfiles/ms/icons/green-dot.png"
      : "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png",
    iconSize: [30,30],
    iconAnchor: [15,30]
  });
}

function loadData() {
  const sheet = secondary.value;

  const old = document.getElementById("jsonp");
  if (old) old.remove();

  const s = document.createElement("script");
  s.id = "jsonp";
  s.src = `${API_BASE}?sheet=${sheet}&callback=handleData`;

  document.body.appendChild(s);
}

function handleData(data) {

  fullData = data; // store full dataset

  populateCityFilter(data);
  applyCityFilter();
}

function populateCityFilter(data) {
  const select = document.getElementById("cityFilter");

  let cities = new Set();

  data.forEach(p => {
    for (let k in p) {
      if (k.toLowerCase().includes("city")) {
        cities.add(p[k]);
      }
    }
  });

  select.innerHTML = '<option value="All">All Cities</option>';

  [...cities].sort().forEach(c => {
    let opt = document.createElement("option");
    opt.value = opt.text = c;
    select.appendChild(opt);
  });
}

function applyCityFilter() {

  const selectedCity = cityFilter.value;

  let filtered = (selectedCity === "All")
    ? fullData
    : fullData.filter(p => {
        for (let k in p) {
          if (k.toLowerCase().includes("city")) {
            return p[k] === selectedCity;
          }
        }
      });

  renderAll(filtered);
}

function renderAll(data) {

  markersLayer.clearLayers();

  let stats = { pending:0, complete:0, started:0 };
  let cityMap = {};
  const sheet = secondary.value;

  data.forEach(p => {

    let city = "Unknown", status="", lat, lng, code;

    for (let k in p) {
      let key = k.toLowerCase();
      if (key.includes("city")) city = p[k];
      if (key.includes("status")) status = String(p[k]).toLowerCase();
      if (key.includes("lat")) lat = parseFloat(p[k]);
      if (key.includes("lng")) lng = parseFloat(p[k]);
      if (key.includes("center")) code = p[k];
    }

    if (!cityMap[city]) cityMap[city] = { total:0, complete:0, coords:[] };

    cityMap[city].total++;

    let isGreen = false;

    if (sheet === "Bio_EN") {
      isGreen = (status === "started");
      isGreen ? stats.started++ : stats.pending++;
    } else {
      isGreen = (status === "completed" || status === "partial");
      isGreen ? stats.complete++ : stats.pending++;
    }

    if (isGreen) cityMap[city].complete++;

    if (!isNaN(lat) && !isNaN(lng)) {
      let m = L.marker([lat,lng], { icon: getIcon(isGreen) });
      m.bindTooltip(`${code} (${city})`);
      markersLayer.addLayer(m);
      cityMap[city].coords.push([lat,lng]);
    }
  });

  renderCityStats(cityMap);
  updateDashboard(sheet, stats);
}

function renderCityStats(cityMap) {

  const div = document.getElementById("cityStats");
  div.innerHTML = "";

  Object.keys(cityMap).forEach(city => {

    const d = cityMap[city];
    const percent = Math.round((d.complete/d.total)*100);

    let card = document.createElement("div");
    card.className = "cityCard";

    card.onclick = () => {
      map.fitBounds(L.latLngBounds(d.coords), {padding:[50,50]});
    };

    card.innerHTML = `
      <div class="col-name">${city}</div>
      <div class="col">${d.total}</div>
      <div class="col">${d.complete}</div>
      <div class="col">${percent}%</div>
    `;

    div.appendChild(card);
  });
}

function updateDashboard(sheet, stats) {
  if (sheet === "Bio_EN") {
    count1.innerHTML = `Started: ${stats.started}`;
    count2.innerHTML = `Pending: ${stats.pending}`;
  } else {
    count1.innerHTML = `Completed: ${stats.complete}`;
    count2.innerHTML = `Pending: ${stats.pending}`;
  }
}

// init
handlePrimaryChange();
setInterval(loadData, 10000);

</script>

</body>
</html>
